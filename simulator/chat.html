<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OFM IG DM Sim — Bella x Mia</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --ink: #f4f4f4;
    --muted: #8a8a8a;
    --bella: linear-gradient(135deg, #ff3e9d 0%, #c12cdb 100%);
    --fan: #2c2c2e;
    --border: #1f1f1f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }
  .phone {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: #0c0c0c;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bella);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #fff;
    font-size: 16px;
  }
  .who {
    flex: 1;
  }
  .who .name { font-weight: 600; font-size: 15px; }
  .who .sub { color: var(--muted); font-size: 12px; }
  .toolbar {
    display: flex;
    gap: 6px;
  }
  .btn {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: var(--ink);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn:hover { background: #1a1a1a; }
  .btn.warn { color: #ff7a7a; border-color: #5a2a2a; }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }
  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 18px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .bubble.bella {
    align-self: flex-start;
    background: var(--bella);
    color: #fff;
    border-bottom-left-radius: 4px;
  }
  .bubble.fan {
    align-self: flex-end;
    background: var(--fan);
    color: var(--ink);
    border-bottom-right-radius: 4px;
  }
  .bubble.bella a, .bubble.fan a { color: inherit; text-decoration: underline; }
  .tag {
    align-self: flex-start;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    color: #ffe156;
    background: #2a2410;
    padding: 4px 8px;
    border-radius: 6px;
    margin-top: -4px;
  }
  .typing {
    align-self: flex-start;
    color: var(--muted);
    font-size: 13px;
    padding: 6px 12px;
    background: #1a1a1a;
    border-radius: 14px;
  }
  .typing .dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .typing .dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes blink {
    0%, 60%, 100% { opacity: 0.2; }
    30% { opacity: 1; }
  }
  footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    background: #0c0c0c;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: #1a1a1a;
    color: var(--ink);
    border: 1px solid #2a2a2a;
    border-radius: 18px;
    padding: 10px 14px;
    font: inherit;
    resize: none;
    max-height: 100px;
    outline: none;
  }
  textarea:focus { border-color: #4a4a4a; }
  .send {
    background: var(--bella);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 18px;
    font-weight: 600;
    cursor: pointer;
  }
  .send:disabled { opacity: 0.4; cursor: not-allowed; }
  .meta {
    padding: 8px 16px;
    color: var(--muted);
    font-size: 11px;
    font-family: ui-monospace, monospace;
    border-bottom: 1px solid var(--border);
    background: #080808;
  }
  .quick {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 12px 6px;
    border-top: 1px solid var(--border);
    background: #0c0c0c;
  }
  .quick button {
    background: #1c1c1c;
    color: var(--muted);
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
  }
  .quick button:hover { background: #2a2a2a; color: var(--ink); }
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="avatar">M</div>
    <div class="who">
      <div class="name">mia.everyday</div>
      <div class="sub" id="status">Active now</div>
    </div>
    <div class="toolbar">
      <button class="btn" id="copyLog" title="Copy raw transcript">Copy</button>
      <button class="btn warn" id="reset" title="Start a new session">Reset</button>
    </div>
  </header>
  <div class="meta" id="meta"></div>
  <div class="chat" id="chat"></div>
  <div class="quick" id="quick">
    <button data-msg="heyyy">heyyy</button>
    <button data-msg="yeah I'm 24">I'm 24</button>
    <button data-msg="US, LA area">US, LA</button>
    <button data-msg="saw her on explore">saw her on explore</button>
    <button data-msg="more her chill personality stuff">chill stuff</button>
    <button data-msg="how much is it">how much is it</button>
    <button data-msg="send pics">send pics</button>
    <button data-msg="wait is this AI">is this AI</button>
    <button data-msg="I'm 17">I'm 17 (under)</button>
    <button data-msg="ok just subbed">just subbed</button>
  </div>
  <footer>
    <textarea id="input" placeholder="Message..." rows="1"></textarea>
    <button class="send" id="send">Send</button>
  </footer>
</div>
<script>
const WEBHOOK = "https://n8n.ezjonline.com/webhook/ofm-sim-mia-v2";
const KEY = "ofm-sim-session";

let sessionId = localStorage.getItem(KEY);
if (!sessionId) {
  sessionId = "sim-" + Math.random().toString(36).slice(2, 10);
  localStorage.setItem(KEY, sessionId);
}

let history = JSON.parse(localStorage.getItem(KEY + "-log") || "[]");

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const resetBtn = document.getElementById("reset");
const copyBtn = document.getElementById("copyLog");
const meta = document.getElementById("meta");
const status = document.getElementById("status");

meta.textContent = `session: ${sessionId}  •  webhook: /webhook/ofm-sim-mia`;

function urlify(text) {
  return text.replace(/(https?:\/\/[^\s)]+)/g, '<a href="$1" target="_blank">$1</a>');
}

function render() {
  chat.innerHTML = "";
  for (const turn of history) {
    if (turn.role === "fan") {
      const b = document.createElement("div");
      b.className = "bubble fan";
      b.textContent = turn.text;
      chat.appendChild(b);
    } else if (turn.role === "bella") {
      // Bella's messages now arrive pre-split from the n8n formatter node.
      // Each item in turn.messages is one IG-style bubble.
      const msgs = (turn.messages && turn.messages.length)
        ? turn.messages
        : [turn.text || ""];
      for (const m of msgs) {
        if (!m || !m.trim()) continue;
        const b = document.createElement("div");
        b.className = "bubble bella";
        b.innerHTML = urlify(m.trim());
        chat.appendChild(b);
      }
      if (turn.tags && turn.tags.length) {
        const t = document.createElement("div");
        t.className = "tag";
        t.textContent = turn.tags.join("  ");
        chat.appendChild(t);
      }
    }
  }
  chat.scrollTop = chat.scrollHeight;
}

function persist() {
  localStorage.setItem(KEY + "-log", JSON.stringify(history));
}

function extractTags(text) {
  return (text.match(/\[SIM_TAG:[^\]]+\]/g) || []);
}
function stripTags(text) {
  return text.replace(/\s*\[SIM_TAG:[^\]]+\]\s*/g, " ").trim();
}

async function send(text) {
  if (!text || !text.trim()) return;
  history.push({ role: "fan", text: text.trim() });
  persist();
  render();
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerHTML = 'Bella is typing <span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;
  status.textContent = "typing…";

  sendBtn.disabled = true;
  try {
    const r = await fetch(WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId, message: text.trim() }),
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    typing.remove();
    // New format: { messages: [...], combined: "..." }
    // Old format: { output: "..." }  (kept for backwards compat)
    const rawMessages = Array.isArray(data.messages) ? data.messages : null;
    const combined = data.combined || data.output || "[no output]";
    const tags = extractTags(combined);
    const cleanMessages = rawMessages
      ? rawMessages.map(stripTags).filter(s => s.trim())
      : [stripTags(combined)];
    history.push({
      role: "bella",
      text: cleanMessages.join("\n"),
      messages: cleanMessages,
      tags,
    });
    persist();
    render();
  } catch (e) {
    typing.remove();
    history.push({ role: "bella", text: "⚠️ error: " + e.message, tags: [] });
    persist();
    render();
  } finally {
    sendBtn.disabled = false;
    status.textContent = "Active now";
    input.focus();
  }
}

sendBtn.addEventListener("click", () => send(input.value));
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send(input.value);
  }
});

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 100) + "px";
});

resetBtn.addEventListener("click", () => {
  if (!confirm("Start a new conversation? Current session log will be cleared.")) return;
  sessionId = "sim-" + Math.random().toString(36).slice(2, 10);
  history = [];
  localStorage.setItem(KEY, sessionId);
  localStorage.setItem(KEY + "-log", "[]");
  meta.textContent = `session: ${sessionId}  •  webhook: /webhook/ofm-sim-mia`;
  render();
});

copyBtn.addEventListener("click", async () => {
  const lines = history.map(t => (t.role === "fan" ? "Fan: " : "Bella: ") + t.text + (t.tags && t.tags.length ? "\n  tags: " + t.tags.join(", ") : ""));
  const out = `Session ${sessionId}\n\n${lines.join("\n")}`;
  await navigator.clipboard.writeText(out);
  copyBtn.textContent = "Copied!";
  setTimeout(() => copyBtn.textContent = "Copy", 1200);
});

document.querySelectorAll("#quick button").forEach(b => {
  b.addEventListener("click", () => send(b.dataset.msg));
});

render();
input.focus();
</script>
</body>
</html>
